<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boundary Asset Gap Checker</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="container">
    <h1>Boundary Asset Gap Checker</h1>
    <p>Upload your extract (CSV/XLSX). Headers are read from <strong>row 2</strong>. Asset types <strong>BOUNDARY: UP</strong> and <strong>BOUNDARY: DOWN</strong> are ignored.</p>

    <section class="controls">
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" />
      <button id="sampleBtn" type="button">Load sample</button>
      <label>
        Direction
        <select id="directionSelect">
          <option value="ALL">ALL</option>
          <option value="UP">UP</option>
          <option value="DOWN">DOWN</option>
        </select>
      </label>
      <button id="prevMile" type="button">◀ Prev mile</button>
      <span id="mileLabel">No data loaded</span>
      <button id="nextMile" type="button">Next mile ▶</button>
    </section>

    <section id="summary" class="summary"></section>
    <section id="timeline" class="timeline"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
