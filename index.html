<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boundary Asset Gap Checker</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Boundary Asset Gap Checker</h1>
      <p>
        Upload your extract (CSV/XLSX). Headers are read from <strong>row 2</strong>.
        Asset types <strong>BOUNDARY: UP</strong> and <strong>BOUNDARY: DOWN</strong> are ignored.
      </p>
    </header>

    <section class="controls" aria-label="Import and filters">
      <div class="control-group file-group">
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" />
        <button id="sampleBtn" type="button">Load sample</button>
      </div>

      <div class="control-group filter-group">
        <label>
          Direction
          <select id="directionSelect">
            <option value="ALL">ALL</option>
            <option value="UP">UP</option>
            <option value="DOWN">DOWN</option>
          </select>
        </label>

        <label>
          Asset type filter
          <input id="assetTypeFilter" type="search" placeholder="e.g. palisade" />
        </label>

        <button id="resetBtn" type="button" class="ghost">Reset filters</button>
      </div>
    </section>

    <section id="summary" class="summary"></section>
    <section id="timeline" class="timeline"></section>

    <section class="mile-controls" aria-label="Mileage selector">
      <button id="prevMile" type="button">◀ Prev mile</button>
      <span id="mileLabel">No data loaded</span>
      <label class="jump-wrap">
        Jump to mile
        <input id="mileJumpInput" type="number" min="0" step="1" inputmode="numeric" />
      </label>
      <button id="jumpBtn" type="button">Jump</button>
      <button id="nextMile" type="button">Next mile ▶</button>
    </section>

    <p id="statusText" class="status-text" role="status" aria-live="polite"></p>
  </main>

  <div id="progressModal" class="progress-modal hidden" role="dialog" aria-modal="true" aria-labelledby="progressTitle">
    <div class="progress-content">
      <h2 id="progressTitle">Processing file</h2>
      <p id="progressMessage">Preparing…</p>
      <div class="progress-track" aria-hidden="true">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
